name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  macos:
    name: macOS · Swift 6
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.0.app
      - name: Show Swift version
        run: swift --version
      - name: Build
        run: swift build -c release
      - name: Test
        run: swift test --parallel

  linux:
    name: Linux · Swift 6
    runs-on: ubuntu-latest
    container:
      image: swift:6.0-jammy
    steps:
      - uses: actions/checkout@v4
      - name: Show Swift version
        run: swift --version
      - name: Build
        run: swift build -c release
      - name: Test
        run: swift test --parallel

  docs:
    name: DocC build
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.0.app
      - name: Generate documentation
        run: swift package generate-documentation --target KernelHarnessKit
